identity:
  name: "skill_agent"
  author: "numlnvis"
  label:
    en_US: "Agent Processing"
    zh_Hans: "Agent处理"
    pt_BR: "Agent Processing"
    ja_JP: "Agent処理"
description:
  human:
    en_US: "An Agent plugin that loads Skills on demand to execute tasks."
    zh_Hans: "按需加载 Skill 执行任务的 Agent 插件"
    pt_BR: "Um plugin de Agent que carrega Skills sob demanda para executar tarefas."
    ja_JP: "必要に応じて Skill を読み込んでタスクを実行する Agent プラグインです。"
  llm: "An Agent plugin that loads Skills on demand to execute tasks."
parameters:
  - name: query
    type: string
    required: true
    label:
      en_US: Query string
      zh_Hans: 查询语句
      pt_BR: Query string
      ja_JP: クエリ文字列
    human_description:
      en_US: "please input your question"
      zh_Hans: "请输入你想问的问题"
      pt_BR: "please input your question"
      ja_JP: "クエリ文字列は、Agent処理 に対して実行するタスクを指定する必要があります。"
    llm_description: "please input your question"
    form: llm

  - name: model
    type: model-selector
    scope: llm
    required: true
    label:
      en_US: Model
      zh_Hans: 大模型
      pt_BR: Model
      ja_JP: モデル
    human_description:
      en_US: Select an LLM to run this tool.
      zh_Hans: 选择用于运行本工具的大模型
      pt_BR: Select an LLM to run this tool.
      ja_JP: "このツールを実行する LLM を選択します"
    llm_description: Select an LLM to run this tool.
    form: form

  - name: max_steps
    type: number
    required: true
    default: 15
    label:
      en_US: Max steps
      zh_Hans: 执行轮数
      pt_BR: Max steps
      ja_JP: 最大ステップ
    human_description:
      en_US: Max reasoning/tool steps inside one call.
      zh_Hans: 单次调用内部最多执行多少轮思考/调用技能
      pt_BR: Max reasoning/tool steps inside one call.
      ja_JP: 1回の呼び出し内での最大ステップ数
    llm_description: Max reasoning/tool steps inside one call.
    form: form

extra:
  python:
    source: tools/skill_agent.py
